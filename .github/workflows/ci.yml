name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: read-only unless a job needs more.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    name: Guardrails (forbidden-identifier + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks scans full history
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # "bidding stays dead" — fails the build if the killed feature reappears.
      - run: pnpm run check:forbidden
      # Secrets must never be committed.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: gitleaks.toml

  quality:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck

  database:
    name: Migrations + RLS isolation tests (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # Spin up local Postgres, apply ALL version-controlled migrations, load seed.
      - run: supabase start
      - run: supabase db reset --no-seed=false
      # The highest-value suite: proves two-sided isolation actually holds.
      # customer A cannot read customer B; cook X cannot read/mutate cook Y.
      - name: pgTAP cross-tenant RLS tests
        run: supabase test db
      # Generated types must match the live schema.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run types:check
